<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FF4B4B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ESG 백테스트">

  <title>ESG 포트폴리오 백테스트</title>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-152.png">
  <link rel="icon" type="image/png" href="icons/icon-96.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0E1117 0%, #1a1a2e 100%);
      color: #FAFAFA;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .logo {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, #FF4B4B 0%, #FF6B6B 100%);
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 30px;
      box-shadow: 0 10px 40px rgba(255, 75, 75, 0.3);
    }

    .logo span {
      font-size: 2rem;
      font-weight: bold;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 10px;
      text-align: center;
    }

    .subtitle {
      color: #888;
      margin-bottom: 40px;
      text-align: center;
    }

    .btn {
      background: linear-gradient(135deg, #FF4B4B 0%, #FF6B6B 100%);
      color: white;
      border: none;
      padding: 18px 50px;
      font-size: 1.2rem;
      border-radius: 15px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 5px 20px rgba(255, 75, 75, 0.4);
    }

    .btn:hover, .btn:active {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(255, 75, 75, 0.5);
    }

    .features {
      margin-top: 50px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      max-width: 350px;
    }

    .feature {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 12px;
      text-align: center;
    }

    .feature-icon {
      font-size: 1.5rem;
      margin-bottom: 8px;
    }

    .feature-text {
      font-size: 0.85rem;
      color: #aaa;
    }

    .install-prompt {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: #1E1E1E;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 5px 30px rgba(0,0,0,0.5);
      z-index: 1000;
    }

    .install-prompt.show {
      display: block;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .install-prompt h3 {
      margin-bottom: 10px;
    }

    .install-prompt p {
      color: #999;
      margin-bottom: 15px;
      font-size: 0.9rem;
    }

    .install-buttons {
      display: flex;
      gap: 10px;
    }

    .install-buttons button {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
    }

    .btn-install {
      background: #FF4B4B;
      color: white;
    }

    .btn-later {
      background: #333;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="logo">
    <span>ESG</span>
  </div>

  <h1>ESG 포트폴리오 백테스트</h1>
  <p class="subtitle">AI 기반 투자 분석 대시보드</p>

  <a href="https://esg-portfolio.streamlit.app" class="btn" id="launchBtn">
    앱 실행하기
  </a>

  <div class="features">
    <div class="feature">
      <div class="feature-icon">📊</div>
      <div class="feature-text">백테스트</div>
    </div>
    <div class="feature">
      <div class="feature-icon">🤖</div>
      <div class="feature-text">ML 예측</div>
    </div>
    <div class="feature">
      <div class="feature-icon">📈</div>
      <div class="feature-text">리밸런싱</div>
    </div>
    <div class="feature">
      <div class="feature-icon">🛡️</div>
      <div class="feature-text">리스크 분석</div>
    </div>
  </div>

  <div class="install-prompt" id="installPrompt">
    <h3>홈 화면에 추가</h3>
    <p>앱처럼 바로 실행할 수 있어요!</p>
    <div class="install-buttons">
      <button class="btn-later" onclick="dismissInstall()">나중에</button>
      <button class="btn-install" onclick="installApp()">추가하기</button>
    </div>
  </div>

  <script>
    let deferredPrompt;

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .then(reg => console.log('SW registered'))
        .catch(err => console.log('SW failed:', err));
    }

    // Handle install prompt
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      setTimeout(() => {
        document.getElementById('installPrompt').classList.add('show');
      }, 2000);
    });

    function installApp() {
      document.getElementById('installPrompt').classList.remove('show');
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((result) => {
          deferredPrompt = null;
        });
      }
    }

    function dismissInstall() {
      document.getElementById('installPrompt').classList.remove('show');
    }
  </script>
</body>
</html>
